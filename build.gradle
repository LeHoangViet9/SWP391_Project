buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath 'org.postgresql:postgresql:42.7.2'
    }
}

plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.2'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.hms'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // --- Spring Boot Starters ---
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-aop'
    implementation 'org.springframework.boot:spring-boot-starter-websocket'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-mail'

    // --- Database (PostgreSQL) ---
    runtimeOnly 'org.postgresql:postgresql'

    // --- Lombok ---
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // --- MapStruct ---
    implementation 'org.mapstruct:mapstruct:1.5.5.Final'
    annotationProcessor 'org.mapstruct:mapstruct-processor:1.5.5.Final'
    annotationProcessor 'org.projectlombok:lombok-mapstruct-binding:0.2.0'

    // --- JWT (Json Web Token) ---
    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'

    // --- QR Code (ZXing) ---
    implementation 'com.google.zxing:core:3.5.3'
    implementation 'com.google.zxing:javase:3.5.3'

    // --- Third-party Services ---
    implementation 'com.cloudinary:cloudinary-http45:1.39.0'

    // --- Development & Testing Tools ---
    developmentOnly 'org.springframework.boot:spring-boot-devtools'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'

}

tasks.named('test') {
    useJUnitPlatform()
    jvmArgs("-XX:+EnableDynamicAgentLoading")
}

tasks.withType(JavaCompile) {
    options.compilerArgs << "-parameters"
}

task seedHousekeepingData {
    doLast {
        def url = "jdbc:postgresql://localhost:5432/hms_db"
        def user = "postgres"
        def pass = "1"
        
        println "=== Seeding Housekeeping Test Data ==="
        
        def driver = new org.postgresql.Driver()
        def props = new java.util.Properties()
        props.setProperty("user", user)
        props.setProperty("password", pass)
        def conn = driver.connect(url, props)
        try {
            def sqlFile = file("TEST_HOUSEKEEPING_CHECKOUT_DATA.sql")
            if (!sqlFile.exists()) {
                throw new GradleException("TEST_HOUSEKEEPING_CHECKOUT_DATA.sql not found!")
            }
            
            def sqlContent = sqlFile.text
            java.sql.Statement stmt = conn.createStatement()
            
            println "Executing SQL script..."
            stmt.execute(sqlContent)
            println "SQL script executed successfully!"
            
            // Check & Print newly seeded rooms and status
            def rs = stmt.executeQuery("SELECT room_number, room_status FROM room WHERE room_number LIKE 'HK-%' ORDER BY room_number")
            println "--- Seeded Rooms Status ---"
            while (rs.next()) {
                println "Room: ${rs.getString('room_number')} | Status: ${rs.getString('room_status')}"
            }
            rs.close()
            
            // Check & Print newly seeded tasks and status
            def rsTasks = stmt.executeQuery("""
                SELECT t.id, r.room_number, t.task_status, u.email 
                FROM housekeeping_task t 
                JOIN room r ON t.room_id = r.id 
                JOIN users u ON t.assigned_to = u.id 
                WHERE r.room_number LIKE 'HK-%' 
                ORDER BY r.room_number
            """)
            println "--- Seeded Housekeeping Tasks ---"
            while (rsTasks.next()) {
                println "Task ID: ${rsTasks.getLong('id')} | Room: ${rsTasks.getString('room_number')} | Status: ${rsTasks.getString('task_status')} | Assigned to: ${rsTasks.getString('email')}"
            }
            rsTasks.close()
            
        } finally {
            conn.close()
        }
    }
}

apply from: 'dbfix.gradle'


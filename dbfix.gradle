import java.sql.DriverManager
import java.sql.Statement

// Gradle task để clean NULL user_name trước khi Hibernate DDL chạy
task fixNullUserName {
    doLast {
        def url = "jdbc:postgresql://localhost:5432/hms_db"
        def user = "postgres"
        def pass = "1"
        
        println "=== Connecting to DB to fix NULL user_name ==="
        
        def conn = DriverManager.getConnection(url, user, pass)
        try {
            Statement stmt = conn.createStatement()
            
            // Check current state
            def rs = stmt.executeQuery("SELECT COUNT(*) FROM users WHERE user_name IS NULL OR user_name = ''")
            rs.next()
            int nullCount = rs.getInt(1)
            println "Found ${nullCount} user(s) with NULL/empty user_name"
            rs.close()
            
            if (nullCount > 0) {
                int deleted = stmt.executeUpdate("DELETE FROM users WHERE user_name IS NULL OR user_name = ''")
                println "Deleted ${deleted} NULL user_name row(s)"
            }
            
            // Check if UNIQUE constraint exists, if not verify column exists
            rs = stmt.executeQuery("""
                SELECT COUNT(*) FROM information_schema.columns 
                WHERE table_name = 'users' AND column_name = 'user_name'
            """)
            rs.next()
            boolean colExists = rs.getInt(1) > 0
            rs.close()
            
            println "Column user_name exists: ${colExists}"
            println "=== Fix complete! Now run bootRun ==="
            
        } finally {
            conn.close()
        }
    }
}


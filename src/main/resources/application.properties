spring.application.name=Hotel_Management_System_SWP

# Database PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/hms_db
spring.datasource.username=postgres
spring.datasource.password=1
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.port=9999

# Messages
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# JWT
hms.jwt.secret=hotel-management-system-secret-key-123456789
hms.jwt.expiration=86400000

# Pagination
app.pagination.default-page=1
app.pagination.default-size=10
app.pagination.max-size=100

# Cloudinary
cloud_name=dowyxacsi
api_key=258772776953537
api_secret=FK0wrCH7oMg3F8MWkyK2Ve52FxY

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587

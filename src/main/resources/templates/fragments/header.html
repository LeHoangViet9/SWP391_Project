<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head-resources">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <!-- Global HMS Styles -->
    <style>
        :root {
            --hms-primary:    #003580;
            --hms-primary-dk: #002060;
            --hms-accent:     #ffd700;
            --hms-accent-hov: #f5c400;
            --hms-dark-bg:    #0d1b2a;
            --hms-card-bg:    rgba(255,255,255,0.04);
            --hms-border:     rgba(255,255,255,0.10);
            --hms-text:       #e8edf3;
            --hms-muted:      #8899a6;
            --sidebar-w:      240px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--hms-dark-bg);
            color: var(--hms-text);
            min-height: 100vh;
        }
        /* ===== TOP NAV ===== */
        .hms-navbar {
            background: var(--hms-primary);
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1050;
            box-shadow: 0 2px 20px rgba(0,0,0,0.4);
            border-bottom: 2px solid rgba(255,215,0,0.25);
        }
        .hms-navbar .brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            margin-right: 2rem;
            flex-shrink: 0;
        }
        .hms-navbar .brand-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--hms-accent), #ff9500);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #fff;
            box-shadow: 0 4px 12px rgba(255,215,0,0.35);
        }
        .hms-navbar .brand-text {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .hms-navbar .brand-text span { color: var(--hms-accent); }
        /* NAV TABS */
        .hms-nav-tabs {
            display: flex;
            align-items: center;
            gap: 0.15rem;
            flex: 1;
        }
        .hms-nav-tabs .nav-tab {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 1rem;
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .hms-nav-tabs .nav-tab i { font-size: 0.95rem; }
        .hms-nav-tabs .nav-tab:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }
        .hms-nav-tabs .nav-tab.active {
            background: rgba(255,215,0,0.18);
            color: var(--hms-accent);
            border-bottom: 2px solid var(--hms-accent);
        }
        /* RIGHT: USER DROPDOWN */
        .hms-navbar .nav-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-left: auto;
        }
        .hms-navbar .user-dropdown-btn {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 0.35rem 1rem 0.35rem 0.45rem;
            cursor: pointer;
            color: #fff;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .hms-navbar .user-dropdown-btn:hover {
            background: rgba(255,255,255,0.18);
        }
        .hms-navbar .user-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--hms-accent), #ff6b35);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; color: #fff; font-weight: 700;
            flex-shrink: 0;
            overflow: hidden;
        }
        .hms-navbar .user-avatar img {
            width: 100%; height: 100%; object-fit: cover;
        }
        /* DROPDOWN MENU */
        .hms-dropdown {
            position: relative;
        }
        .hms-dropdown-menu {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: #1a2a3a;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            min-width: 220px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            opacity: 0;
            transform: translateY(-8px) scale(0.97);
            pointer-events: none;
            transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            overflow: hidden;
        }
        .hms-dropdown.open .hms-dropdown-menu {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }
        .hms-dropdown-header {
            padding: 1rem 1.1rem 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .hms-dropdown-header .dd-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
        }
        .hms-dropdown-header .dd-role {
            font-size: 0.75rem;
            color: var(--hms-accent);
            margin-top: 0.15rem;
        }
        .hms-dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.65rem 1.1rem;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 0.875rem;
            transition: background 0.15s;
        }
        .hms-dropdown-item i { width: 16px; text-align: center; }
        .hms-dropdown-item:hover {
            background: rgba(255,255,255,0.07);
            color: #fff;
        }
        .hms-dropdown-item.logout {
            color: #f87171;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .hms-dropdown-item.logout:hover { background: rgba(248,113,113,0.1); }
        /* MAIN CONTENT OFFSET */
        .hms-content {
            margin-top: 64px;
            padding: 2rem;
            min-height: calc(100vh - 64px - 180px);
        }
        /* TOAST */
        .hms-toast-wrapper {
            position: fixed; top: 1.5rem; right: 1.5rem;
            z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .hms-toast {
            display: flex; align-items: flex-start; gap: 0.75rem;
            background: #1a2a3a;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 0.85rem 1.1rem;
            min-width: 300px; max-width: 420px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            animation: slideInRight 0.3s ease;
        }
        .hms-toast.success { border-left: 4px solid #10b981; }
        .hms-toast.error   { border-left: 4px solid #ef4444; }
        .hms-toast.warning { border-left: 4px solid #f59e0b; }
        .hms-toast .toast-icon { font-size: 1.2rem; margin-top: 2px; }
        .hms-toast.success .toast-icon { color: #10b981; }
        .hms-toast.error   .toast-icon { color: #ef4444; }
        .hms-toast.warning .toast-icon { color: #f59e0b; }
        .hms-toast .toast-body .toast-title { font-weight: 600; font-size: 0.9rem; color: #fff; }
        .hms-toast .toast-body .toast-msg   { font-size: 0.82rem; color: var(--hms-muted); margin-top: 2px; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        /* ===== TABLE STYLES ===== */
        .hms-table-wrapper {
            background: var(--hms-card-bg);
            border: 1px solid var(--hms-border);
            border-radius: 16px;
            overflow: hidden;
        }
        .hms-table { width: 100%; border-collapse: collapse; }
        .hms-table thead th {
            background: rgba(0,53,128,0.5);
            color: rgba(255,255,255,0.7);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--hms-border);
            white-space: nowrap;
        }
        .hms-table tbody td {
            padding: 0.85rem 1rem;
            font-size: 0.875rem;
            color: var(--hms-text);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            vertical-align: middle;
        }
        .hms-table tbody tr:hover td { background: rgba(255,255,255,0.03); }
        .hms-table tbody tr:last-child td { border-bottom: none; }
        /* BADGES */
        .badge-status {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 0.3rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
        }
        .badge-active   { background: rgba(16,185,129,0.15); color: #10b981; }
        .badge-inactive { background: rgba(239,68,68,0.15);  color: #ef4444; }
        .badge-good     { background: rgba(16,185,129,0.15); color: #10b981; }
        .badge-minor    { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .badge-broken   { background: rgba(239,68,68,0.15);  color: #ef4444; }
        /* PAGE HEADER */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.75rem; flex-wrap: wrap; gap: 1rem;
        }
        .page-header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem; font-weight: 700;
            color: #fff; margin: 0;
        }
        .page-header h1 span { color: var(--hms-accent); }
        /* BTN PRIMARY */
        .btn-hms-primary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--hms-primary);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff; border-radius: 10px;
            padding: 0.6rem 1.25rem;
            font-size: 0.875rem; font-weight: 600;
            cursor: pointer; text-decoration: none;
            transition: all 0.2s;
        }
        .btn-hms-primary:hover {
            background: var(--hms-primary-dk);
            box-shadow: 0 4px 16px rgba(0,53,128,0.5);
            color: #fff; transform: translateY(-1px);
        }
        .btn-hms-accent {
            background: linear-gradient(135deg, var(--hms-accent), #ff9500);
            color: #1a1a1a; border: none;
        }
        .btn-hms-accent:hover {
            background: linear-gradient(135deg, var(--hms-accent-hov), #e88a00);
            color: #1a1a1a; box-shadow: 0 4px 16px rgba(255,215,0,0.35);
        }
        /* SEARCH BAR */
        .hms-search-bar {
            display: flex; align-items: center;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--hms-accent);
            border-radius: 50px;
            padding: 0.5rem 1.25rem;
            gap: 0.6rem; max-width: 500px; width: 100%;
        }
        .hms-search-bar i { color: var(--hms-accent); font-size: 1rem; }
        .hms-search-bar input {
            background: none; border: none; outline: none;
            color: #fff; font-size: 0.95rem; flex: 1;
        }
        .hms-search-bar input::placeholder { color: var(--hms-muted); }
        /* MODAL */
        .hms-modal .modal-content {
            background: #152238;
            border: 1px solid var(--hms-border);
            border-radius: 18px;
            color: var(--hms-text);
        }
        .hms-modal .modal-header {
            background: var(--hms-primary);
            border-radius: 18px 18px 0 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 1.5rem;
        }
        .hms-modal .modal-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 700; color: #fff; font-size: 1rem;
        }
        .hms-modal .modal-body { padding: 1.5rem; }
        .hms-modal .modal-footer {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 1rem 1.5rem;
        }
        .hms-modal .btn-close { filter: invert(1); opacity: 0.7; }
        /* FORM CONTROLS IN MODAL */
        .hms-modal .form-label {
            font-size: 0.82rem; font-weight: 600;
            color: var(--hms-muted); text-transform: uppercase;
            letter-spacing: 0.4px; margin-bottom: 0.4rem;
        }
        .hms-modal .form-control,
        .hms-modal .form-select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px; color: #fff;
            padding: 0.65rem 0.9rem; font-size: 0.9rem;
        }
        .hms-modal .form-control:focus,
        .hms-modal .form-select:focus {
            background: rgba(255,255,255,0.09);
            border-color: var(--hms-accent);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.12);
            color: #fff;
        }
        .hms-modal .form-control::placeholder { color: var(--hms-muted); }
        .hms-modal .form-select option { background: #152238; color: #fff; }
        .hms-modal textarea.form-control { resize: vertical; min-height: 100px; }
    </style>
</head>

<!-- ============================================================
     HEADER FRAGMENT
     Usage: <div th:replace="~{fragments/header :: header(activeTab='room-list')}">
     activeTab values: 'room-list', 'room-type', 'customer', 'equipment'
     ============================================================ -->
<header th:fragment="header(activeTab)" class="hms-navbar">

    <!-- BRAND LOGO -->
    <a href="/dashboard" class="brand">
        <div class="brand-icon">
            <i class="fa-solid fa-hotel"></i>
        </div>
        <span class="brand-text">HMS <span>Hotel</span></span>
    </a>

    <!-- NAV TABS -->
    <nav class="hms-nav-tabs" id="hmsNavTabs">
        <a href="/rooms"
           th:classappend="${activeTab == 'room-list'} ? ' active' : ''"
           class="nav-tab">
            <i class="fa-solid fa-table-cells-large"></i>
            <span>Sơ đồ phòng</span>
        </a>
        <a href="/room-types"
           th:classappend="${activeTab == 'room-type'} ? ' active' : ''"
           class="nav-tab">
            <i class="fa-solid fa-layer-group"></i>
            <span>Loại phòng</span>
        </a>
        <a href="/customers"
           th:classappend="${activeTab == 'customer'} ? ' active' : ''"
           class="nav-tab">
            <i class="fa-solid fa-users"></i>
            <span>Khách hàng</span>
        </a>
        <a href="/equipments"
           th:classappend="${activeTab == 'equipment'} ? ' active' : ''"
           class="nav-tab">
            <i class="fa-solid fa-screwdriver-wrench"></i>
            <span>Trang thiết bị</span>
        </a>
    </nav>

    <!-- RIGHT: NOTIFICATION + USER -->
    <div class="nav-right">
        <!-- Notification Bell -->
        <button class="hms-dropdown-item" style="background:none; border:none; color:rgba(255,255,255,0.75); font-size:1.1rem; cursor:pointer; padding: 0.4rem 0.5rem; border-radius: 8px; transition: all 0.2s;"
                id="btnNotification" title="Thông báo">
            <i class="fa-regular fa-bell"></i>
        </button>

        <!-- User Dropdown -->
        <div class="hms-dropdown" id="userDropdown">
            <button class="user-dropdown-btn" id="userDropdownBtn">
                <div class="user-avatar" id="navUserAvatar">
                    <!-- Avatar image if available -->
                    <span id="navUserInitial" th:text="${#authentication != null and #authentication.name != null} ? ${#authentication.name.substring(0,1).toUpperCase()} : 'A'">A</span>
                </div>
                <span id="navUserName"
                      th:text="${#authentication != null} ? ${#authentication.name} : 'Nhân viên'">Nhân viên</span>
                <i class="fa-solid fa-chevron-down" style="font-size:0.7rem; opacity:0.7;"></i>
            </button>

            <div class="hms-dropdown-menu" id="userDropdownMenu">
                <div class="hms-dropdown-header">
                    <div class="dd-name" th:text="${#authentication != null} ? ${#authentication.name} : 'Nhân viên HMS'">Nhân viên HMS</div>
                    <div class="dd-role">
                        <i class="fa-solid fa-shield-halved" style="font-size:0.7rem;"></i>
                        <span th:text="${#authentication != null and !#authentication.authorities.isEmpty()} ? ${#authentication.authorities.iterator().next().authority} : 'STAFF'">STAFF</span>
                    </div>
                </div>
                <a href="/profile" class="hms-dropdown-item">
                    <i class="fa-regular fa-user"></i> Hồ sơ cá nhân
                </a>
                <a href="/change-password" class="hms-dropdown-item">
                    <i class="fa-solid fa-key"></i> Đổi mật khẩu
                </a>
                <a href="/logout" class="hms-dropdown-item logout"
                   onclick="return confirm('Bạn có chắc muốn đăng xuất?')">
                    <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
                </a>
            </div>
        </div>
    </div>

    <!-- INLINE SCRIPTS FOR DROPDOWN TOGGLE -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const dropdownEl = document.getElementById('userDropdown');
            const dropdownBtn = document.getElementById('userDropdownBtn');

            dropdownBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                dropdownEl.classList.toggle('open');
            });

            document.addEventListener('click', function () {
                dropdownEl.classList.remove('open');
            });
        });
    </script>
</header>

<!-- ============================================================
     TOAST CONTAINER (include once, used by all pages)
     ============================================================ -->
<div th:fragment="toast-container" class="hms-toast-wrapper" id="hmsToastWrapper"></div>

</html>

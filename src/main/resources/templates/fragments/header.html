<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hotel Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --hms-primary: #003580;
            --hms-secondary: #0071c2;
            --hms-accent: #febb02;
            --hms-accent-dark: #e6a800;
            --hms-dark: #1a1a2e;
            --hms-light-bg: #f4f6fb;
            --hms-border: #d0d9e8;
            --hms-text-muted: #6b7c93;
            --hms-success: #28a745;
            --hms-danger: #dc3545;
            --hms-warning: #ffc107;
        }
        * { font-family: 'Inter', sans-serif; }
        .navbar-hms {
            background: linear-gradient(135deg, #003580 0%, #0052a5 100%);
            box-shadow: 0 2px 20px rgba(0, 53, 128, 0.3);
            padding: 0.6rem 0;
            position: sticky;
            top: 0;
            z-index: 1040;
        }
        .navbar-hms .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: #fff !important;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }
        .navbar-hms .navbar-brand .brand-icon {
            width: 38px;
            height: 38px;
            background: var(--hms-accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--hms-primary);
            font-size: 1.1rem;
            font-weight: 800;
            box-shadow: 0 2px 8px rgba(254,187,2,0.4);
        }
        .navbar-hms .brand-text-sub {
            font-size: 0.68rem;
            font-weight: 400;
            color: rgba(255,255,255,0.7);
            display: block;
            line-height: 1;
        }
        .navbar-hms .brand-text-main {
            display: block;
            line-height: 1.2;
        }
        .nav-link-hms {
            color: rgba(255,255,255,0.88) !important;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.6rem 0.85rem !important;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-link-hms:hover, .nav-link-hms.active {
            color: #fff !important;
            background: rgba(255,255,255,0.15);
        }
        .nav-link-hms i { font-size: 0.85rem; opacity: 0.85; }
        .navbar-toggler { border-color: rgba(255,255,255,0.3); }
        .navbar-toggler-icon { filter: invert(1); }
        .user-avatar-btn {
            background: rgba(255,255,255,0.12);
            border: 1.5px solid rgba(255,255,255,0.25);
            border-radius: 30px;
            padding: 5px 14px 5px 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .user-avatar-btn:hover {
            background: rgba(255,255,255,0.22);
            border-color: rgba(255,255,255,0.4);
        }
        .avatar-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--hms-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--hms-primary);
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        .user-name {
            color: #fff;
            font-size: 0.85rem;
            font-weight: 500;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .dropdown-menu-hms {
            min-width: 200px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            padding: 0.4rem;
            margin-top: 8px !important;
        }
        .dropdown-item-hms {
            border-radius: 8px;
            padding: 0.55rem 0.9rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
        }
        .dropdown-item-hms:hover { background: #f0f4fb; color: var(--hms-primary); }
        .dropdown-item-hms i { width: 16px; color: var(--hms-text-muted); }
        .dropdown-item-hms.text-danger:hover { background: #fff0f0; }
        .dropdown-divider-hms { margin: 0.3rem 0.4rem; border-color: #eef0f5; }
        .navbar-hms .dropdown-toggle::after { display: none; }
    </style>
</head>
<body>

<!-- ===== HEADER FRAGMENT ===== -->
<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-hms">
        <div class="container-fluid px-4">

            <!-- Brand -->
            <a class="navbar-brand" th:href="@{/}">
                <div class="brand-icon">
                    <i class="fa-solid fa-hotel"></i>
                </div>
                <div>
                    <span class="brand-text-main">HMS</span>
                    <span class="brand-text-sub">Hotel Management</span>
                </div>
            </a>

            <!-- Mobile Toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarHMS"
                    aria-controls="navbarHMS" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Nav Links -->
            <div class="collapse navbar-collapse" id="navbarHMS">
                <ul class="navbar-nav me-auto ms-3 gap-1">
                    <li class="nav-item">
                        <a class="nav-link-hms" th:href="@{/rooms}" th:classappend="${activePage == 'rooms'} ? 'active'">
                            <i class="fa-solid fa-map-location-dot"></i>
                            <span>Sơ đồ phòng</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-hms" th:href="@{/room-types}" th:classappend="${activePage == 'room-types'} ? 'active'">
                            <i class="fa-solid fa-layer-group"></i>
                            <span>Loại phòng</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-hms" th:href="@{/customers}" th:classappend="${activePage == 'customers'} ? 'active'">
                            <i class="fa-solid fa-users"></i>
                            <span>Khách hàng</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-hms" th:href="@{/equipments}" th:classappend="${activePage == 'equipments'} ? 'active'">
                            <i class="fa-solid fa-screwdriver-wrench"></i>
                            <span>Trang thiết bị</span>
                        </a>
                    </li>
                </ul>

                <!-- Right: User Dropdown -->
                <div class="d-flex align-items-center ms-auto">
                    <div class="dropdown">
                        <div class="user-avatar-btn dropdown-toggle" id="userDropdown"
                             data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="avatar-circle">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <span class="user-name" th:text="${currentUser != null ? currentUser.fullName : 'Nhân viên'}">Nhân viên</span>
                            <i class="fa-solid fa-chevron-down" style="color:rgba(255,255,255,0.7); font-size:0.7rem;"></i>
                        </div>
                        <ul class="dropdown-menu dropdown-menu-hms dropdown-menu-end" aria-labelledby="userDropdown">
                            <li>
                                <a class="dropdown-item-hms" th:href="@{/profile}">
                                    <i class="fa-solid fa-id-card"></i>
                                    <span>Hồ sơ</span>
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item-hms" th:href="@{/change-password}">
                                    <i class="fa-solid fa-lock"></i>
                                    <span>Đổi mật khẩu</span>
                                </a>
                            </li>
                            <li><hr class="dropdown-divider-hms"/></li>
                            <li>
                                <a class="dropdown-item-hms text-danger"
                                   th:href="@{/logout}"
                                   onclick="return confirm('Bạn có chắc muốn đăng xuất?')">
                                    <i class="fa-solid fa-right-from-bracket"></i>
                                    <span>Đăng xuất</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>
<!-- ===== END HEADER FRAGMENT ===== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

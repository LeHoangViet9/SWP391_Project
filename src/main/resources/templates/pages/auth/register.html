<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - HotelPro Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 550px;
            width: 100%;
            padding: 50px 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .register-header .logo {
            font-size: 48px;
            color: #003580;
            margin-bottom: 15px;
        }

        .register-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #003580;
            margin-bottom: 8px;
        }

        .register-header p {
            font-size: 14px;
            color: #999;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #003580;
            box-shadow: 0 0 0 3px rgba(0, 53, 128, 0.1);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        .alert {
            border: none;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: block;
        }

        .alert-danger {
            background-color: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }

        .alert-success {
            background-color: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background-color: #003580;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-register:hover {
            background-color: #002856;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 53, 128, 0.2);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .form-footer {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 14px;
        }

        .form-footer a {
            color: #003580;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .form-footer a:hover {
            color: #002856;
            text-decoration: underline;
        }

        .form-check {
            display: flex;
            align-items: flex-start;
            margin-top: 15px;
        }

        .form-check input {
            width: auto !important;
            margin-right: 8px;
            margin-top: 4px;
            cursor: pointer;
        }

        .form-check label {
            margin-bottom: 0;
            cursor: pointer;
            font-weight: 400;
            font-size: 13px;
            line-height: 1.5;
        }

        .login-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #003580;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #002856;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 12px;
            display: none;
        }

        .strength-bar {
            height: 4px;
            background-color: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 3px;
        }

        .strength-indicator {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        @media (max-width: 576px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .register-container {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
<div class="register-container">
    <!-- Register Header -->
    <div class="register-header">
        <div class="logo">
            <i class="fas fa-user-plus"></i>
        </div>
        <h1>Đăng ký tài khoản</h1>
        <p>Tạo tài khoản nhân viên mới cho HotelPro Manager</p>
    </div>

    <!-- Alert Messages -->
    <div th:if="${param.error}" class="alert alert-danger show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error ?: 'Đăng ký thất bại. Vui lòng kiểm tra lại thông tin'}"></span>
    </div>

    <div th:if="${success}" class="alert alert-success show" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        Đăng ký thành công! Chuyển hướng đến trang đăng nhập...
    </div>

    <!-- Register Form -->
    <form th:action="@{/register}" method="post" class="register-form" id="registerForm">
        <!-- Full Name Row -->
        <div class="form-row">
            <div class="form-group">
                <label for="firstName">
                    <i class="fas fa-user me-2" style="color: #003580;"></i>Họ
                </label>
                <input type="text" id="firstName" name="firstName" placeholder="Nhập họ" required>
            </div>
            <div class="form-group">
                <label for="lastName">
                    <i class="fas fa-user me-2" style="color: #003580;"></i>Tên
                </label>
                <input type="text" id="lastName" name="lastName" placeholder="Nhập tên" required>
            </div>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label for="email">
                <i class="fas fa-envelope me-2" style="color: #003580;"></i>Email
            </label>
            <input type="email" id="email" name="email" placeholder="Nhập địa chỉ email" required>
        </div>

        <!-- Phone -->
        <div class="form-group">
            <label for="phone">
                <i class="fas fa-phone me-2" style="color: #003580;"></i>Số điện thoại
            </label>
            <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại" pattern="[0-9]{10,11}" required>
        </div>

        <!-- Password -->
        <div class="form-group">
            <label for="password">
                <i class="fas fa-lock me-2" style="color: #003580;"></i>Mật khẩu
            </label>
            <input type="password" id="password" name="password" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)" minlength="6" required onkeyup="checkPasswordStrength()">
            <div class="password-strength" id="passwordStrength">
                <div class="strength-bar">
                    <div class="strength-indicator" id="strengthIndicator"></div>
                </div>
                <span id="strengthText"></span>
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
            <label for="confirmPassword">
                <i class="fas fa-lock me-2" style="color: #003580;"></i>Xác nhận mật khẩu
            </label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu" required>
        </div>

        <!-- Department (Optional) -->
        <div class="form-group">
            <label for="department">
                <i class="fas fa-building me-2" style="color: #003580;"></i>Phòng ban (Tùy chọn)
            </label>
            <select id="department" name="department">
                <option value="">-- Chọn phòng ban --</option>
                <option value="reception">Lễ tân</option>
                <option value="housekeeping">Dọn phòng</option>
                <option value="maintenance">Bảo trì</option>
                <option value="management">Quản lý</option>
                <option value="other">Khác</option>
            </select>
        </div>

        <!-- Agree Terms -->
        <div class="form-check">
            <input type="checkbox" class="form-check-input" id="agreeTerms" name="agreeTerms" required>
            <label class="form-check-label" for="agreeTerms">
                Tôi đồng ý với <a href="#" style="color: #003580; text-decoration: underline;">Điều khoản sử dụng</a> và <a href="#" style="color: #003580; text-decoration: underline;">Chính sách riêng tư</a>
            </label>
        </div>

        <button type="submit" class="btn-register">
            <i class="fas fa-user-check me-2"></i>Tạo tài khoản
        </button>

        <div class="form-footer">
            <a href="/login">
                <i class="fas fa-arrow-left me-1"></i>Quay lại đăng nhập
            </a>
        </div>
    </form>

    <!-- Login Link -->
    <div class="login-link">
        Đã có tài khoản?
        <a href="/login">
            <i class="fas fa-sign-in-alt me-1"></i>Đăng nhập ngay
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function checkPasswordStrength() {
        const password = document.getElementById('password').value;
        const strengthDiv = document.getElementById('passwordStrength');
        const indicator = document.getElementById('strengthIndicator');
        const strengthText = document.getElementById('strengthText');

        strengthDiv.style.display = password.length > 0 ? 'block' : 'none';

        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;

        indicator.style.width = (strength * 20) + '%';

        if (strength < 2) {
            indicator.style.backgroundColor = '#dc3545';
            strengthText.textContent = 'Yếu';
        } else if (strength < 4) {
            indicator.style.backgroundColor = '#ffc107';
            strengthText.textContent = 'Trung bình';
        } else {
            indicator.style.backgroundColor = '#28a745';
            strengthText.textContent = 'Mạnh';
        }
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            e.preventDefault();
            alert('Mật khẩu không khớp!');
            return false;
        }

        if (!document.getElementById('agreeTerms').checked) {
            e.preventDefault();
            alert('Vui lòng đồng ý với Điều khoản sử dụng và Chính sách riêng tư');
            return false;
        }
    });
</script>
</body>
</html>

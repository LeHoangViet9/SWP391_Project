<!-- ============================================================================
     CUSTOMER MANAGEMENT PAGE (Quản lý Khách hàng) - COMPLETE VERSION
     File: src/main/resources/templates/pages/customer/customer-list-complete.html

     Features:
     - Search bar with yellow border and large rounded corners
     - Customer list table with hover effect
     - Edit (pencil icon) and Delete (trash icon) buttons
     - Modal for add/edit customer with form fields:
       - Firstname/Lastname, Email, Phone, ID Type (CCCD/Passport), ID Number, Nationality
     - Thymeleaf form integration with th:action and th:object
     - Proper validation and error handling

     ============================================================================ -->
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Khách hàng - HMS Hotel Management</title>
    <div th:replace="~{fragments/header :: head-resources}"></div>
    <style>
        .customer-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #003580, #0050b3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .customer-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .customer-name {
            font-weight: 600;
            color: #fff;
            font-size: 0.875rem;
        }
        .customer-email {
            font-size: 0.78rem;
            color: #8899a6;
        }
        .id-type-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.25);
            color: #ffd700;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .btn-action {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .btn-action.edit {
            background: rgba(59,130,246,0.12);
            border-color: rgba(59,130,246,0.3);
            color: #60a5fa;
        }
        .btn-action.edit:hover {
            background: rgba(59,130,246,0.25);
            color: #93c5fd;
            transform: translateY(-2px);
        }
        .btn-action.delete {
            background: rgba(239,68,68,0.12);
            border-color: rgba(239,68,68,0.3);
            color: #f87171;
        }
        .btn-action.delete:hover {
            background: rgba(239,68,68,0.25);
            color: #fca5a5;
            transform: translateY(-2px);
        }
        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 1.1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .stat-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }
        .stat-label {
            font-size: 0.78rem;
            color: #8899a6;
            margin-top: 0.2rem;
        }
        .page-btn {
            min-width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #8899a6;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            padding: 0 0.5rem;
        }
        .page-btn:hover {
            background: rgba(0,53,128,0.4);
            color: #fff;
            border-color: rgba(0,53,128,0.5);
        }
        .page-btn.active {
            background: #003580;
            color: #fff;
            border-color: #003580;
        }
        .page-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div th:replace="~{fragments/header :: header(activeTab='customer')}"></div>

    <!-- MAIN CONTENT -->
    <main class="hms-content">
        <!-- PAGE HEADER -->
        <div class="page-header">
            <div>
                <h1><i class="fa-solid fa-users" style="color: #ffd700; font-size: 1.4rem; margin-right: 0.5rem;"></i>Quản lý <span>Khách hàng</span></h1>
                <p style="color: #8899a6; font-size: 0.85rem; margin-top: 0.25rem;">
                    Xem, thêm, chỉnh sửa và quản lý thông tin khách hàng
                </p>
            </div>
            <button class="btn-hms-primary btn-hms-accent"
                    data-bs-toggle="modal"
                    data-bs-target="#customerModal"
                    onclick="openAddModal()">
                <i class="fa-solid fa-user-plus"></i> Thêm khách hàng
            </button>
        </div>

        <!-- STATS ROW -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.75rem;">
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(0,80,179,0.2); color: #60a5fa;">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div>
                    <div class="stat-val" th:text="${customers != null} ? ${customers.totalElements} : '0'">0</div>
                    <div class="stat-label">Tổng khách hàng</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(16,185,129,0.2); color: #10b981;">
                    <i class="fa-solid fa-user-check"></i>
                </div>
                <div>
                    <div class="stat-val" th:text="${activeCount != null} ? ${activeCount} : '0'">0</div>
                    <div class="stat-label">Đang hoạt động</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(245,158,11,0.2); color: #f59e0b;">
                    <i class="fa-solid fa-user-clock"></i>
                </div>
                <div>
                    <div class="stat-val" th:text="${newCustomersCount != null} ? ${newCustomersCount} : '0'">0</div>
                    <div class="stat-label">Mới hôm nay</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(139,92,246,0.2); color: #a78bfa;">
                    <i class="fa-solid fa-passport"></i>
                </div>
                <div>
                    <div class="stat-val" th:text="${domesticCount != null} ? ${domesticCount} : '0'">0</div>
                    <div class="stat-label">Khách trong nước</div>
                </div>
            </div>
        </div>

        <!-- SEARCH + FILTER -->
        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
            <form method="get" th:action="@{/customers}" style="display: flex; gap: 0.75rem; align-items: center; flex: 1; flex-wrap: wrap;">
                <!-- SEARCH BAR (viền vàng, bo góc lớn) -->
                <div class="hms-search-bar" style="flex: 1; min-width: 300px;">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text"
                           name="keywords"
                           id="searchKeywords"
                           th:value="${keywords}"
                           placeholder="Tìm theo tên, SĐT, email, CCCD/Passport...">
                    <button type="submit" style="background: none; border: none; color: #ffd700; cursor: pointer; padding: 0;">
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>

                <!-- STATUS FILTER -->
                <select name="status" class="form-select"
                        style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #fff; border-radius: 10px; width: auto; font-size: 0.875rem;"
                        onchange="this.form.submit()">
                    <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">Đang hoạt động</option>
                    <option value="INACTIVE" th:selected="${status == 'INACTIVE'}">Không hoạt động</option>
                </select>

                <!-- SORT -->
                <select name="sortBy" class="form-select"
                        style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #fff; border-radius: 10px; width: auto; font-size: 0.875rem;"
                        onchange="this.form.submit()">
                    <option value="ID" th:selected="${sortBy == 'ID'}">Mặc định</option>
                    <option value="FULL_NAME" th:selected="${sortBy == 'FULL_NAME'}">Tên A→Z</option>
                    <option value="CREATED_AT" th:selected="${sortBy == 'CREATED_AT'}">Mới nhất</option>
                </select>
            </form>

            <!-- EXPORT -->
            <button class="btn-hms-primary" onclick="alert('Chức năng xuất Excel sẽ được thêm vào')" title="Xuất Excel">
                <i class="fa-solid fa-file-excel"></i> Xuất
            </button>
        </div>

        <!-- SUCCESS / ERROR ALERTS -->
        <div class="hms-alert" th:if="${successMessage != null}"
             style="background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: #6ee7b7; border-radius: 12px; padding: 0.85rem 1rem; display: flex; align-items: center; gap: 0.65rem; margin-bottom: 1rem;">
            <i class="fa-solid fa-circle-check" style="color: #10b981;"></i>
            <span th:text="${successMessage}">Thành công!</span>
        </div>
        <div style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 0.85rem 1rem; display: flex; align-items: center; gap: 0.65rem; margin-bottom: 1rem; color: #fca5a5;"
             th:if="${errorMessage != null}">
            <i class="fa-solid fa-circle-xmark" style="color: #ef4444;"></i>
            <span th:text="${errorMessage}">Lỗi.</span>
        </div>

        <!-- CUSTOMER TABLE -->
        <div class="hms-table-wrapper">
            <table class="hms-table">
                <thead>
                    <tr>
                        <th style="width: 5%;">#</th>
                        <th style="width: 25%;">Khách hàng</th>
                        <th style="width: 15%;">Số điện thoại</th>
                        <th style="width: 12%;">Loại giấy tờ</th>
                        <th style="width: 15%;">Số CCCD/Passport</th>
                        <th style="width: 15%;">Trạng thái</th>
                        <th style="width: 13%;">Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="customer : ${customers.content}" th:if="${customers.totalElements > 0}">
                        <!-- ID -->
                        <td style="color: #8899a6; font-size: 0.85rem;">
                            <strong th:text="${customer.id}"></strong>
                        </td>
                        <!-- Customer Info -->
                        <td>
                            <div class="customer-info">
                                <div class="customer-avatar" th:text="${customer.fullName.substring(0, 1).toUpperCase()}"></div>
                                <div>
                                    <div class="customer-name" th:text="${customer.fullName}"></div>
                                    <div class="customer-email" th:text="${customer.email}"></div>
                                </div>
                            </div>
                        </td>
                        <!-- Phone -->
                        <td th:text="${customer.phone}"></td>
                        <!-- ID Type -->
                        <td>
                            <span class="id-type-badge" th:text="${customer.idCard != null ? (customer.idCard.startsWith('H') ? 'Hộ Chiếu' : 'CCCD') : 'N/A'}"></span>
                        </td>
                        <!-- ID Number -->
                        <td>
                            <code style="background: rgba(255,255,255,0.04); padding: 0.25rem 0.5rem; border-radius: 4px; color: #f59e0b; font-size: 0.8rem;"
                                  th:text="${customer.idCard}"></code>
                        </td>
                        <!-- Status -->
                        <td>
                            <span class="badge-status" th:classappend="${customer.status == 'ACTIVE'} ? 'badge-active' : 'badge-inactive'">
                                <i class="fa-solid" th:classappend="${customer.status == 'ACTIVE'} ? 'fa-check-circle' : 'fa-times-circle'"></i>
                                <span th:text="${customer.status == 'ACTIVE'} ? 'Hoạt động' : 'Bị khóa'"></span>
                            </span>
                        </td>
                        <!-- Actions -->
                        <td>
                            <div style="display: flex; gap: 0.5rem;">
                                <button type="button" class="btn-action edit"
                                        data-bs-toggle="modal"
                                        data-bs-target="#customerModal"
                                        th:onclick="'openEditModal(' + ${customer.id} + ')'">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <button type="button" class="btn-action delete"
                                        th:onclick="'deleteCustomer(' + ${customer.id} + ')'">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${customers.totalElements == 0}">
                        <td colspan="7" style="text-align: center; padding: 2rem; color: #8899a6;">
                            <i class="fa-solid fa-inbox" style="font-size: 2rem; display: block; margin-bottom: 0.5rem;"></i>
                            Không có khách hàng nào
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- PAGINATION -->
        <div style="display: flex; justify-content: center; margin-top: 1.5rem; gap: 0.5rem;" th:if="${customers.totalPages > 1}">
            <a href="#" class="page-btn" th:classappend="${!customers.hasPrevious()} ? 'disabled' : ''"
               th:href="${customers.hasPrevious() ? '/customers?page=' + (customers.number - 1) : '#'}">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <a href="#" class="page-btn" th:each="pageNum : ${#numbers.sequence(0, customers.totalPages - 1)}"
               th:classappend="${pageNum == customers.number} ? 'active' : ''"
               th:href="'/customers?page=' + ${pageNum}"
               th:text="${pageNum + 1}"></a>
            <a href="#" class="page-btn" th:classappend="${!customers.hasNext()} ? 'disabled' : ''"
               th:href="${customers.hasNext() ? '/customers?page=' + (customers.number + 1) : '#'}">
                <i class="fa-solid fa-chevron-right"></i>
            </a>
        </div>
    </main>

    <!-- MODAL: ADD/EDIT CUSTOMER -->
    <div class="modal fade hms-modal" id="customerModal" tabindex="-1" aria-labelledby="customerModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="customerModalLabel">
                        <i class="fa-solid fa-user-plus me-2"></i>Thêm khách hàng mới
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <form id="customerForm" th:action="@{/api/v1/customers}" th:object="${customer}" method="post">
                    <div class="modal-body">
                        <input type="hidden" id="customerId" th:field="*{id}">

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="fullName" class="form-label">
                                <i class="fa-solid fa-user me-2" style="color: var(--hms-primary);"></i>Họ và tên
                            </label>
                            <input type="text" class="form-control" id="fullName" th:field="*{fullName}"
                                   placeholder="Nhập họ và tên khách hàng" required>
                        </div>

                        <div class="form-row">
                            <!-- Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">
                                    <i class="fa-solid fa-envelope me-2" style="color: var(--hms-primary);"></i>Email
                                </label>
                                <input type="email" class="form-control" id="email" th:field="*{email}"
                                       placeholder="Địa chỉ email" required>
                            </div>

                            <!-- Phone -->
                            <div class="mb-3">
                                <label for="phone" class="form-label">
                                    <i class="fa-solid fa-phone me-2" style="color: var(--hms-primary);"></i>Số điện thoại
                                </label>
                                <input type="tel" class="form-control" id="phone" th:field="*{phone}"
                                       placeholder="0xxxxxxxxx" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <!-- ID Type -->
                            <div class="mb-3">
                                <label for="idType" class="form-label">
                                    <i class="fa-solid fa-id-card me-2" style="color: var(--hms-primary);"></i>Loại giấy tờ
                                </label>
                                <select class="form-select" id="idType" th:field="*{idType}" required>
                                    <option value="">Chọn loại</option>
                                    <option value="ID_CARD">Chứng minh thư nhân dân</option>
                                    <option value="PASSPORT">Hộ chiếu</option>
                                    <option value="DRIVER_LICENSE">Bằng lái xe</option>
                                </select>
                            </div>

                            <!-- ID Card Number -->
                            <div class="mb-3">
                                <label for="idNumberCard" class="form-label">
                                    <i class="fa-solid fa-barcode me-2" style="color: var(--hms-primary);"></i>Số CCMD/Passport
                                </label>
                                <input type="text" class="form-control" id="idNumberCard" th:field="*{idNumberCard}"
                                       placeholder="Số chứng minh thư hoặc hộ chiếu" required>
                            </div>
                        </div>

                        <!-- Nationality -->
                        <div class="mb-3">
                            <label for="nationality" class="form-label">
                                <i class="fa-solid fa-globe me-2" style="color: var(--hms-primary);"></i>Quốc tịch
                            </label>
                            <input type="text" class="form-control" id="nationality" th:field="*{nationality}"
                                   placeholder="Vd: Việt Nam, Thái Lan, Trung Quốc..." required>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-hms-primary btn-hms-accent">
                            <i class="fa-solid fa-save me-2"></i>Lưu khách hàng
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- TOAST CONTAINER -->
    <div th:replace="~{fragments/header :: toast-container}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openAddModal() {
            document.getElementById('customerForm').reset();
            document.getElementById('customerId').value = '';
            document.getElementById('customerModalLabel').innerHTML = '<i class="fa-solid fa-user-plus me-2"></i>Thêm khách hàng mới';
        }

        function openEditModal(customerId) {
            // Fetch customer data
            fetch(`/api/v1/customers/${customerId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const customer = data.data;
                        document.getElementById('customerId').value = customer.id;
                        document.getElementById('fullName').value = customer.fullName;
                        document.getElementById('email').value = customer.email;
                        document.getElementById('phone').value = customer.phone;
                        document.getElementById('idType').value = customer.idType;
                        document.getElementById('idNumberCard').value = customer.idCard;
                        document.getElementById('nationality').value = customer.nationality;
                        document.getElementById('customerModalLabel').innerHTML = '<i class="fa-solid fa-user-pen me-2"></i>Cập nhật khách hàng';
                    }
                })
                .catch(err => console.error('Error:', err));
        }

        function deleteCustomer(customerId) {
            if (!confirm('Bạn có chắc muốn xóa khách hàng này?')) return;

            fetch(`/api/v1/customers/${customerId}`, {
                method: 'DELETE'
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast('success', 'Thành công', 'Khách hàng đã được xóa');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showToast('error', 'Lỗi', data.message || 'Xóa khách hàng thất bại');
                }
            })
            .catch(err => {
                console.error(err);
                showToast('error', 'Lỗi', 'Có lỗi xảy ra khi xóa khách hàng');
            });
        }

        function showToast(type, title, message) {
            const toastWrapper = document.getElementById('hmsToastWrapper');
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark';
            const toast = document.createElement('div');
            toast.className = `hms-toast ${type}`;
            toast.innerHTML = `
                <div class="toast-icon">
                    <i class="fa-solid ${icon}"></i>
                </div>
                <div class="toast-body">
                    <div class="toast-title">${title}</div>
                    <div class="toast-msg">${message}</div>
                </div>
            `;
            toastWrapper.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // Form submission
        document.getElementById('customerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const id = document.getElementById('customerId').value;
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/v1/customers/${id}` : '/api/v1/customers';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(Object.fromEntries(formData))
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showToast('success', 'Thành công', 'Khách hàng đã được lưu');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    showToast('error', 'Lỗi', data.message || 'Lưu khách hàng thất bại');
                }
            })
            .catch(err => {
                console.error(err);
                showToast('error', 'Lỗi', 'Có lỗi xảy ra');
            });
        });
    </script>
</body>
</html>

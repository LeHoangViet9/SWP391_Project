<!-- ============================================================================
     ROOM TYPE MANAGEMENT PAGE (Loại Phòng) - COMPLETE VERSION
     File: src/main/resources/templates/pages/hotel/room-type-complete.html

     Features:
     - Grid cards like Booking.com showing room types
     - Amenities as checkboxes (WiFi, AC, Fridge, TV, Balcony)
     - Price badge (bg-success)
     - Update price button with modal
     - Add new room type button
     - Proper Thymeleaf integration with backend

     ============================================================================ -->
<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Loại Phòng - HMS Hotel Management</title>
    <div th:replace="~{fragments/header :: head-resources}"></div>
    <style>
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .room-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .room-card:hover {
            transform: translateY(-4px);
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,215,0,0.3);
            box-shadow: 0 8px 24px rgba(0,53,128,0.3);
        }
        .card-header {
            background: rgba(0,53,128,0.3);
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: start;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
        }
        .price-badge {
            background: #10b981;
            color: white;
            padding: 0.35rem 0.75rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .card-body {
            padding: 1.25rem;
            flex: 1;
        }
        .amenities-section {
            margin-bottom: 1.25rem;
        }
        .amenities-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--hms-muted);
            margin-bottom: 0.75rem;
            letter-spacing: 0.5px;
        }
        .amenities-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .amenity-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: var(--hms-text);
        }
        .amenity-item input[type="checkbox"] {
            cursor: pointer;
            accent-color: var(--hms-accent);
            margin: 0;
        }
        .amenity-item label {
            cursor: pointer;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .room-description {
            font-size: 0.85rem;
            color: var(--hms-muted);
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        .card-footer {
            padding: 1rem;
            background: rgba(0,53,128,0.15);
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 0.5rem;
        }
        .btn-card-action {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            transition: all 0.2s;
        }
        .btn-update-price {
            background: rgba(59,130,246,0.15);
            color: #60a5fa;
            border: 1px solid rgba(59,130,246,0.3);
        }
        .btn-update-price:hover {
            background: rgba(59,130,246,0.25);
            color: #93c5fd;
        }
        .btn-delete-room {
            background: rgba(239,68,68,0.15);
            color: #f87171;
            border: 1px solid rgba(239,68,68,0.3);
        }
        .btn-delete-room:hover {
            background: rgba(239,68,68,0.25);
            color: #fca5a5;
        }
        .no-data-message {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--hms-muted);
        }
        .no-data-message i {
            font-size: 3rem;
            opacity: 0.5;
            display: block;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div th:replace="~{fragments/header :: header(activeTab='room-type')}"></div>

    <!-- MAIN CONTENT -->
    <div class="hms-content">
        <!-- PAGE HEADER -->
        <div class="page-header">
            <h1><i class="fa-solid fa-layer-group me-2" style="color: var(--hms-accent);"></i>Quản lý <span>Loại Phòng</span></h1>
            <button type="button" class="btn-hms-primary btn-hms-accent" data-bs-toggle="modal" data-bs-target="#roomTypeModal" onclick="openAddRoomTypeModal()">
                <i class="fa-solid fa-plus"></i> Thêm loại phòng
            </button>
        </div>

        <!-- ROOMS GRID -->
        <div class="rooms-grid" id="roomTypesGrid" th:if="${roomTypes != null and roomTypes.size() > 0}">
            <div class="room-card" th:each="roomType : ${roomTypes}" th:attr="data-roomtype-id=${roomType.id}">
                <!-- Card Header with Title and Price -->
                <div class="card-header">
                    <h3 class="card-title" th:text="${roomType.typeName}"></h3>
                    <div class="price-badge" th:text="'₫' + ${#numbers.formatDecimal(roomType.basePrice, 0, 'COMMA')}"></div>
                </div>

                <!-- Card Body - Description & Amenities -->
                <div class="card-body">
                    <!-- Description -->
                    <div class="room-description" th:text="${roomType.description != null ? roomType.description : 'Không có mô tả'}" style="margin-bottom: 1rem;"></div>

                    <!-- Amenities Section -->
                    <div class="amenities-section">
                        <div class="amenities-title">Tiện nghi</div>
                        <div class="amenities-list">
                            <div class="amenity-item">
                                <input type="checkbox" id="wifi" class="amenity-checkbox" disabled>
                                <label for="wifi">
                                    <i class="fa-solid fa-wifi" style="color: var(--hms-accent);"></i> Wi-Fi miễn phí
                                </label>
                            </div>
                            <div class="amenity-item">
                                <input type="checkbox" id="ac" class="amenity-checkbox" disabled>
                                <label for="ac">
                                    <i class="fa-solid fa-snowflake" style="color: #60a5fa;"></i> Điều hòa
                                </label>
                            </div>
                            <div class="amenity-item">
                                <input type="checkbox" id="fridge" class="amenity-checkbox" disabled>
                                <label for="fridge">
                                    <i class="fa-solid fa-refrigerator" style="color: #a78bfa;"></i> Tủ lạnh
                                </label>
                            </div>
                            <div class="amenity-item">
                                <input type="checkbox" id="tv" class="amenity-checkbox" disabled>
                                <label for="tv">
                                    <i class="fa-solid fa-tv" style="color: #f59e0b;"></i> Tivi
                                </label>
                            </div>
                            <div class="amenity-item">
                                <input type="checkbox" id="balcony" class="amenity-checkbox" disabled>
                                <label for="balcony">
                                    <i class="fa-solid fa-window-maximize" style="color: #10b981;"></i> Ban công
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Max Guests Info -->
                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.08);">
                        <span style="font-size: 0.8rem; color: var(--hms-muted);">
                            <i class="fa-solid fa-users me-1"></i> Sức chứa:
                        </span>
                        <strong style="color: #fff;" th:text="${roomType.maxGuests + ' khách'}"></strong>
                    </div>
                </div>

                <!-- Card Footer - Actions -->
                <div class="card-footer">
                    <button type="button" class="btn-card-action btn-update-price"
                            data-bs-toggle="modal" data-bs-target="#priceModal"
                            th:onclick="'openPriceUpdateModal(' + ${roomType.id} + ', ' + ${roomType.basePrice} + ')'">
                        <i class="fa-solid fa-dollar-sign"></i> Cập nhật giá
                    </button>
                    <button type="button" class="btn-card-action btn-delete-room"
                            th:onclick="'if(confirm(\"Bạn chắc rằng muốn xóa loại phòng này?\")) fetch(\"/api/v1/room-types/' + ${roomType.id} + '\", {method: \"DELETE\"}).then(r => r.json()).then(d => { if(d.success) location.reload(); else alert(d.message); });'">
                        <i class="fa-solid fa-trash"></i> Xóa
                    </button>
                </div>
            </div>
        </div>

        <!-- No Data Message -->
        <div class="no-data-message" th:if="${roomTypes == null or roomTypes.size() == 0}">
            <i class="fa-solid fa-door-open"></i>
            <p>Chưa có loại phòng nào</p>
            <p style="font-size: 0.85rem; color: var(--hms-muted);">Nhấn "Thêm loại phòng" ở trên để tạo mới</p>
        </div>
    </div>

    <!-- MODAL: ADD/EDIT ROOM TYPE -->
    <div class="modal fade hms-modal" id="roomTypeModal" tabindex="-1" aria-labelledby="roomTypeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="roomTypeModalLabel">
                        <i class="fa-solid fa-plus me-2"></i>Thêm loại phòng mới
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <form id="roomTypeForm" th:action="@{/api/v1/room-types}" th:object="${roomType}" method="post">
                    <div class="modal-body">
                        <input type="hidden" id="roomTypeId" th:field="*{id}">

                        <!-- Room Type Name -->
                        <div class="mb-3">
                            <label for="typeName" class="form-label">
                                <i class="fa-solid fa-door-open me-2" style="color: var(--hms-primary);"></i>Tên loại phòng
                            </label>
                            <input type="text" class="form-control" id="typeName" th:field="*{typeName}"
                                   placeholder="Vd: Phòng đơn, Phòng đôi, Suite..." required>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label for="description" class="form-label">
                                <i class="fa-solid fa-pen-to-square me-2" style="color: var(--hms-primary);"></i>Mô tả
                            </label>
                            <textarea class="form-control" id="description" th:field="*{description}"
                                      placeholder="Mô tả chi tiết về loại phòng..." rows="3"></textarea>
                        </div>

                        <!-- Base Price -->
                        <div class="mb-3">
                            <label for="basePrice" class="form-label">
                                <i class="fa-solid fa-money-bill-wave me-2" style="color: var(--hms-primary);"></i>Giá cơ bản (VND/đêm)
                            </label>
                            <input type="number" class="form-control" id="basePrice" th:field="*{basePrice}"
                                   placeholder="Nhập giá tiền" min="0" step="10000" required>
                        </div>

                        <!-- Max Guests -->
                        <div class="mb-3">
                            <label for="maxGuests" class="form-label">
                                <i class="fa-solid fa-users me-2" style="color: var(--hms-primary);"></i>Sức chứa (số khách tối đa)
                            </label>
                            <input type="number" class="form-control" id="maxGuests" th:field="*{maxGuests}"
                                   placeholder="Số khách" min="1" max="10" required>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-hms-primary btn-hms-accent">
                            <i class="fa-solid fa-save me-2"></i>Lưu loại phòng
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL: UPDATE PRICE -->
    <div class="modal fade hms-modal" id="priceModal" tabindex="-1" aria-labelledby="priceModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="priceModalLabel">
                        <i class="fa-solid fa-dollar-sign me-2"></i>Cập nhật giá tiền
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <form id="priceForm" method="post" th:action="@{/api/v1/room-types/update-price}">
                    <div class="modal-body">
                        <input type="hidden" id="roomTypeIdPrice" name="id">

                        <div class="mb-3">
                            <label for="newPrice" class="form-label">
                                <i class="fa-solid fa-money-bill-wave me-2" style="color: var(--hms-primary);"></i>Giá mới (VND/đêm)
                            </label>
                            <input type="number" class="form-control" id="newPrice" name="basePrice"
                                   placeholder="Nhập giá tiền mới" min="0" step="10000" required>
                        </div>

                        <div class="mb-3">
                            <label for="priceNote" class="form-label">
                                <i class="fa-solid fa-note-sticky me-2" style="color: var(--hms-primary);"></i>Ghi chú (tùy chọn)
                            </label>
                            <textarea class="form-control" id="priceNote" name="note"
                                      placeholder="Ghi chú về thay đổi giá..." rows="2"></textarea>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-hms-primary btn-hms-accent">
                            <i class="fa-solid fa-check me-2"></i>Cập nhật
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- TOAST CONTAINER -->
    <div th:replace="~{fragments/header :: toast-container}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Open Add Modal
        function openAddRoomTypeModal() {
            document.getElementById('roomTypeForm').reset();
            document.getElementById('roomTypeId').value = '';
            document.getElementById('roomTypeModalLabel').innerHTML = '<i class="fa-solid fa-plus me-2"></i>Thêm loại phòng mới';
        }

        // Open Price Update Modal
        function openPriceUpdateModal(roomTypeId, currentPrice) {
            document.getElementById('roomTypeIdPrice').value = roomTypeId;
            document.getElementById('newPrice').value = currentPrice;
            document.getElementById('priceNote').value = '';
        }

        // Toast helper
        function showToast(type, title, message) {
            const toastWrapper = document.getElementById('hmsToastWrapper');
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-xmark';
            const toast = document.createElement('div');
            toast.className = `hms-toast ${type}`;
            toast.innerHTML = `
                <div class="toast-icon">
                    <i class="fa-solid ${icon}"></i>
                </div>
                <div class="toast-body">
                    <div class="toast-title">${title}</div>
                    <div class="toast-msg">${message}</div>
                </div>
            `;
            toastWrapper.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
</html>

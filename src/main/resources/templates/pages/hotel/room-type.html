<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Danh sách loại phòng - Hotel Management System"/>
    <title>Loại phòng - Hotel Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --hms-primary: #003580;
            --hms-secondary: #0071c2;
            --hms-accent: #febb02;
            --hms-light-bg: #f4f6fb;
            --hms-border: #e0e6f0;
        }
        * { font-family: 'Inter', sans-serif; }
        body { background: var(--hms-light-bg); min-height: 100vh; display: flex; flex-direction: column; }
        .page-header {
            background: linear-gradient(135deg, #003580 0%, #0052a5 100%);
            color: #fff; padding: 1.5rem 0;
        }
        .page-header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 10px; }
        .page-header .breadcrumb { margin-bottom: 0; }
        .page-header .breadcrumb-item { font-size: 0.82rem; color: rgba(255,255,255,0.7); }
        .page-header .breadcrumb-item.active { color: rgba(255,255,255,0.9); }
        .page-header .breadcrumb-item a { color: rgba(255,255,255,0.7); text-decoration: none; }
        .main-content { flex: 1; padding: 1.8rem 0; }
        /* Toolbar */
        .toolbar-card {
            background: #fff; border-radius: 14px;
            padding: 1.1rem 1.4rem;
            box-shadow: 0 2px 12px rgba(0,53,128,0.07);
            border: 1px solid var(--hms-border);
            margin-bottom: 1.5rem;
        }
        .search-input-wrap { position: relative; flex: 1; max-width: 360px; }
        .search-input-wrap .si { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9daec2; font-size: 0.88rem; }
        .search-input {
            width: 100%; padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1.5px solid var(--hms-border); border-radius: 10px;
            font-size: 0.875rem; background: #f8fafd; outline: none; transition: all 0.2s;
        }
        .search-input:focus { border-color: var(--hms-secondary); background: #fff; box-shadow: 0 0 0 3px rgba(0,113,194,0.1); }
        .btn-add-rt {
            background: linear-gradient(135deg, #febb02, #e6a800);
            color: var(--hms-primary); font-weight: 700; font-size: 0.875rem;
            padding: 0.6rem 1.2rem; border: none; border-radius: 10px;
            cursor: pointer; transition: all 0.2s; white-space: nowrap;
        }
        .btn-add-rt:hover { box-shadow: 0 4px 14px rgba(254,187,2,0.4); transform: translateY(-1px); }
        /* Room type card grid */
        .rt-card {
            background: #fff; border-radius: 16px;
            border: 1px solid var(--hms-border);
            box-shadow: 0 2px 12px rgba(0,53,128,0.07);
            overflow: hidden; transition: all 0.25s;
        }
        .rt-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,53,128,0.14); }
        .rt-card-header {
            background: linear-gradient(135deg, #003580, #0071c2);
            padding: 1.3rem 1.4rem;
            position: relative; overflow: hidden;
        }
        .rt-card-header::after {
            content: '\f015';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute; right: -10px; bottom: -15px;
            font-size: 4.5rem; color: rgba(255,255,255,0.08);
            pointer-events: none;
        }
        .rt-name { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 0.3rem; }
        .rt-price-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--hms-accent); color: var(--hms-primary);
            font-size: 0.85rem; font-weight: 700;
            border-radius: 20px; padding: 4px 12px;
        }
        .rt-card-body { padding: 1.2rem 1.4rem; }
        .rt-info-row { display: flex; align-items: center; gap: 8px; margin-bottom: 0.6rem; font-size: 0.855rem; color: #4a5568; }
        .rt-info-row i { width: 18px; color: var(--hms-secondary); font-size: 0.8rem; }
        .rt-amenities { margin-top: 0.8rem; }
        .rt-amenities-title { font-size: 0.75rem; font-weight: 600; color: #9daec2; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
        .amenity-chip {
            display: inline-flex; align-items: center; gap: 5px;
            background: #f0f4ff; border: 1px solid #dce4ff;
            border-radius: 20px; padding: 3px 10px;
            font-size: 0.76rem; font-weight: 500; color: #5c7cfa;
            margin: 2px;
        }
        .amenity-chip i { font-size: 0.7rem; }
        .rt-card-footer { padding: 0.9rem 1.4rem; border-top: 1px solid #f0f4fb; display: flex; gap: 8px; }
        .btn-update-price {
            flex: 1; background: linear-gradient(135deg, #003580, #0071c2);
            color: #fff; border: none; border-radius: 10px;
            font-size: 0.85rem; font-weight: 600; padding: 0.6rem;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-update-price:hover { box-shadow: 0 4px 14px rgba(0,53,128,0.3); }
        .btn-edit-rt {
            width: 38px; height: 38px; border: 1.5px solid #e0e6f0;
            background: #f8fafd; border-radius: 10px; color: var(--hms-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; transition: all 0.2s;
        }
        .btn-edit-rt:hover { background: var(--hms-secondary); color: #fff; border-color: var(--hms-secondary); }
        .btn-delete-rt {
            width: 38px; height: 38px; border: 1.5px solid #ffe0e0;
            background: #fff8f8; border-radius: 10px; color: #e74c3c;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; transition: all 0.2s;
        }
        .btn-delete-rt:hover { background: #e74c3c; color: #fff; border-color: #e74c3c; }
        .status-badge {
            font-size: 0.72rem; padding: 2px 8px; border-radius: 6px; font-weight: 600;
        }
        /* Modal */
        .modal-header-hms {
            background: linear-gradient(135deg, #003580, #0071c2);
            color: #fff; border-radius: 16px 16px 0 0; padding: 1.2rem 1.5rem;
        }
        .modal-header-hms .btn-close { filter: invert(1); opacity: 0.8; }
        .modal-content { border-radius: 16px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-body { padding: 1.5rem; }
        .modal-footer { padding: 1rem 1.5rem; border-top: 1px solid #f0f4fb; }
        .form-label-modal { font-size: 0.82rem; font-weight: 600; color: #2d3748; margin-bottom: 0.35rem; }
        .form-control-modal { border: 1.5px solid #e0e6f0; border-radius: 10px; font-size: 0.875rem; padding: 0.62rem 0.9rem; transition: all 0.2s; }
        .form-control-modal:focus { border-color: var(--hms-secondary); box-shadow: 0 0 0 3px rgba(0,113,194,0.1); }
        .btn-modal-save {
            background: linear-gradient(135deg, #003580, #0071c2); color: #fff;
            border: none; border-radius: 10px; font-weight: 600; font-size: 0.88rem;
            padding: 0.62rem 1.5rem; transition: all 0.2s;
        }
        .btn-modal-save:hover { box-shadow: 0 4px 14px rgba(0,53,128,0.3); color: #fff; }
        .amenity-check { display: flex; flex-wrap: wrap; gap: 10px; }
        .amenity-check-item {
            display: flex; align-items: center; gap: 7px;
            background: #f8fafd; border: 1.5px solid #e0e6f0;
            border-radius: 10px; padding: 7px 12px; cursor: pointer;
            font-size: 0.85rem; transition: all 0.2s; user-select: none;
        }
        .amenity-check-item:hover { border-color: var(--hms-secondary); color: var(--hms-secondary); }
        .amenity-check-item input[type=checkbox] { accent-color: var(--hms-secondary); }
        .amenity-check-item input:checked ~ span { color: var(--hms-secondary); font-weight: 600; }
        .price-highlight {
            background: linear-gradient(135deg, #fffbe6, #fff9d0);
            border: 1.5px solid #febb02; border-radius: 12px; padding: 1rem;
            text-align: center;
        }
        .price-highlight .big-price { font-size: 1.8rem; font-weight: 800; color: var(--hms-primary); }
        .price-highlight .price-label { font-size: 0.78rem; color: #9daec2; }
        .toast-hms {
            position: fixed; top: 80px; right: 20px; z-index: 9999;
            min-width: 280px; border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .loading-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3);
            z-index: 9998; display: none; align-items: center; justify-content: center;
        }
        .loading-spinner {
            width: 50px; height: 50px;
            border: 4px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .skeleton-card {
            background: linear-gradient(90deg, #f0f4fb 25%, #e8edf8 50%, #f0f4fb 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 16px; height: 280px;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<!-- Header -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Page Header -->
<div class="page-header">
    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div>
                <h1><i class="fa-solid fa-layer-group"></i> Loại phòng</h1>
                <nav aria-label="breadcrumb" class="mt-1">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
                        <li class="breadcrumb-item active">Loại phòng</li>
                    </ol>
                </nav>
            </div>
        </div>
    </div>
</div>

<!-- Main -->
<main class="main-content">
    <div class="container-fluid px-4">

        <!-- Toolbar -->
        <div class="toolbar-card">
            <div class="d-flex align-items-center gap-3 flex-wrap">
                <div class="search-input-wrap">
                    <i class="fa-solid fa-magnifying-glass si"></i>
                    <input type="text" class="search-input" id="rtSearch"
                           placeholder="Tìm theo tên loại phòng..."
                           oninput="debounceSearch(this.value)"/>
                </div>
                <div class="ms-auto d-flex gap-2">
                    <button class="btn-add-rt" onclick="openAddRoomTypeModal()" id="btnAddRoomType">
                        <i class="fa-solid fa-plus me-2"></i>Thêm loại phòng
                    </button>
                </div>
            </div>
        </div>

        <!-- Cards Grid -->
        <div class="row g-3" id="roomTypeGrid">
            <!-- Skeleton loading -->
            <div class="col-md-4 col-lg-3 skeleton-card-wrap" th:each="i : ${#numbers.sequence(1,4)}">
                <div class="skeleton-card"></div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="text-center py-5 d-none" id="emptyState">
            <div style="font-size:4rem; opacity:0.3; margin-bottom:1rem;">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <h5 style="color:#6b7c93;">Không tìm thấy loại phòng</h5>
            <p style="color:#9daec2; font-size:0.875rem;">Thêm loại phòng đầu tiên để bắt đầu</p>
            <button class="btn-add-rt" onclick="openAddRoomTypeModal()">
                <i class="fa-solid fa-plus me-2"></i>Thêm loại phòng
            </button>
        </div>
    </div>
</main>

<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- ===== Update Price Modal ===== -->
<div class="modal fade" id="updatePriceModal" tabindex="-1" aria-labelledby="updatePriceTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header-hms">
                <h5 class="modal-title" id="updatePriceTitle">
                    <i class="fa-solid fa-tag me-2"></i>Cập nhật giá phòng
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
            </div>
            <form id="updatePriceForm" novalidate>
                <div class="modal-body">
                    <input type="hidden" id="priceRoomTypeId"/>
                    <div class="price-highlight mb-3">
                        <div class="price-label">Giá hiện tại</div>
                        <div class="big-price" id="currentPriceDisplay">0</div>
                        <div class="price-label">VNĐ / đêm</div>
                    </div>
                    <label class="form-label-modal" for="newPrice">Giá mới (VNĐ/đêm) <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <input type="number" class="form-control form-control-modal" id="newPrice"
                               placeholder="Nhập giá mới..." min="0" step="1000" required/>
                        <span class="input-group-text" style="border-radius:0 10px 10px 0; border:1.5px solid #e0e6f0; background:#f8fafd; font-size:0.85rem;">VNĐ</span>
                    </div>
                    <div class="invalid-feedback d-block d-none" id="priceError">Vui lòng nhập giá hợp lệ</div>
                    <small class="text-muted" style="font-size:0.77rem;">* Nhập số nguyên dương, đơn vị VNĐ</small>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal" style="border-radius:10px;">Hủy</button>
                    <button type="submit" class="btn btn-modal-save" id="btnSavePrice">
                        <i class="fa-solid fa-floppy-disk me-1"></i>Cập nhật giá
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- ===== Add / Edit RoomType Modal ===== -->
<div class="modal fade" id="roomTypeModal" tabindex="-1" aria-labelledby="roomTypeModalTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header-hms">
                <h5 class="modal-title" id="roomTypeModalTitle">
                    <i class="fa-solid fa-plus me-2"></i>Thêm loại phòng
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
            </div>
            <form id="roomTypeForm" novalidate>
                <div class="modal-body">
                    <input type="hidden" id="rtId"/>
                    <div class="row g-3">
                        <div class="col-md-8">
                            <label class="form-label-modal" for="rtTypeName">Tên loại phòng <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-modal" id="rtTypeName" placeholder="Ví dụ: Phòng Deluxe, Suite..." required/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label-modal" for="rtMaxGuests">Số khách tối đa <span class="text-danger">*</span></label>
                            <input type="number" class="form-control form-control-modal" id="rtMaxGuests" placeholder="2" min="1" max="20" required/>
                        </div>
                        <div class="col-12">
                            <label class="form-label-modal" for="rtBasePrice">Giá cơ bản (VNĐ/đêm) <span class="text-danger">*</span></label>
                            <input type="number" class="form-control form-control-modal" id="rtBasePrice" placeholder="500000" min="0" step="1000" required/>
                        </div>
                        <div class="col-12">
                            <label class="form-label-modal" for="rtDescription">Mô tả</label>
                            <textarea class="form-control form-control-modal" id="rtDescription" rows="2" placeholder="Mô tả về loại phòng..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label-modal d-block mb-2">Tiện nghi phòng</label>
                            <div class="amenity-check">
                                <label class="amenity-check-item">
                                    <input type="checkbox" name="amenity" value="wifi"/>
                                    <i class="fa-solid fa-wifi" style="color:#0071c2;"></i>
                                    <span>Wi-Fi</span>
                                </label>
                                <label class="amenity-check-item">
                                    <input type="checkbox" name="amenity" value="ac"/>
                                    <i class="fa-solid fa-snowflake" style="color:#74b9ff;"></i>
                                    <span>Điều hòa</span>
                                </label>
                                <label class="amenity-check-item">
                                    <input type="checkbox" name="amenity" value="fridge"/>
                                    <i class="fa-solid fa-box" style="color:#55efc4;"></i>
                                    <span>Tủ lạnh</span>
                                </label>
                                <label class="amenity-check-item">
                                    <input type="checkbox" name="amenity" value="tv"/>
                                    <i class="fa-solid fa-tv" style="color:#a29bfe;"></i>
                                    <span>TV</span>
                                </label>
                                <label class="amenity-check-item">
                                    <input type="checkbox" name="amenity" value="balcony"/>
                                    <i class="fa-solid fa-sun" style="color:#fdcb6e;"></i>
                                    <span>Ban công</span>
                                </label>
                                <label class="amenity-check-item">
                                    <input type="checkbox" name="amenity" value="bathtub"/>
                                    <i class="fa-solid fa-bath" style="color:#74b9ff;"></i>
                                    <span>Bồn tắm</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal" style="border-radius:10px;">Hủy</button>
                    <button type="submit" class="btn btn-modal-save" id="btnSaveRoomType">
                        <i class="fa-solid fa-floppy-disk me-1"></i>Lưu lại
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast toast-hms align-items-center text-white border-0" id="toastMsg" role="alert">
    <div class="d-flex">
        <div class="toast-body" id="toastText"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const RT_API = '/api/v1/room-types';
    let searchTimeout = null;
    const updatePriceModal = new bootstrap.Modal(document.getElementById('updatePriceModal'));
    const roomTypeModal = new bootstrap.Modal(document.getElementById('roomTypeModal'));
    const toastEl = document.getElementById('toastMsg');
    const toastInst = new bootstrap.Toast(toastEl, { delay: 3500 });

    const AMENITIES = {
        wifi: { icon: 'fa-wifi', label: 'Wi-Fi', color: '#0071c2' },
        ac: { icon: 'fa-snowflake', label: 'Điều hòa', color: '#74b9ff' },
        fridge: { icon: 'fa-box', label: 'Tủ lạnh', color: '#55efc4' },
        tv: { icon: 'fa-tv', label: 'TV', color: '#a29bfe' },
        balcony: { icon: 'fa-sun', label: 'Ban công', color: '#fdcb6e' },
        bathtub: { icon: 'fa-bath', label: 'Bồn tắm', color: '#74b9ff' }
    };

    function showToast(msg, type = 'success') {
        toastEl.className = `toast toast-hms align-items-center text-white border-0 bg-${type === 'success' ? 'success' : 'danger'}`;
        document.getElementById('toastText').textContent = msg;
        toastInst.show();
    }
    function showLoading(v) { document.getElementById('loadingOverlay').style.display = v ? 'flex' : 'none'; }
    function debounceSearch(v) { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => loadRoomTypes(), 400); }
    function fmtPrice(v) { return Number(v).toLocaleString('vi-VN'); }

    async function loadRoomTypes() {
        const kw = document.getElementById('rtSearch').value.trim();
        const params = new URLSearchParams({ sortBy: 'ID', direction: 'ASC', size: 100 });
        if (kw) params.append('keywords', kw);
        try {
            const res = await fetch(`${RT_API}?${params}`, { headers: { 'Accept': 'application/json' } });
            const json = await res.json();
            if (json.success) renderRoomTypes(json.data.content);
        } catch (e) {
            document.getElementById('roomTypeGrid').innerHTML = `<div class="col-12 text-center text-danger py-4">Không thể tải dữ liệu</div>`;
        }
    }

    function renderRoomTypes(list) {
        const grid = document.getElementById('roomTypeGrid');
        const empty = document.getElementById('emptyState');
        if (!list || list.length === 0) {
            grid.innerHTML = '';
            empty.classList.remove('d-none');
            return;
        }
        empty.classList.add('d-none');
        grid.innerHTML = list.map(rt => `
            <div class="col-md-6 col-lg-4 col-xl-3">
                <div class="rt-card" id="rtCard${rt.id}">
                    <div class="rt-card-header">
                        <div class="d-flex align-items-start justify-content-between mb-2">
                            <div class="rt-name">${escHtml(rt.typeName || '')}</div>
                            <span class="badge ${rt.status === 'ACTIVE' ? 'bg-success' : 'bg-secondary'} ms-2" style="font-size:0.7rem;">${rt.status === 'ACTIVE' ? 'Hoạt động' : 'Tạm dừng'}</span>
                        </div>
                        <span class="rt-price-badge">
                            <i class="fa-solid fa-tag" style="font-size:0.75rem;"></i>
                            ${fmtPrice(rt.basePrice)} VNĐ/đêm
                        </span>
                    </div>
                    <div class="rt-card-body">
                        <div class="rt-info-row">
                            <i class="fa-solid fa-users"></i>
                            <span>Tối đa <strong>${rt.maxGuests || 2}</strong> khách</span>
                        </div>
                        <div class="rt-info-row" th:if="${rt.description}" style="${rt.description ? '' : 'display:none'}">
                            <i class="fa-solid fa-circle-info"></i>
                            <span style="font-size:0.82rem; color:#6b7c93;">${rt.description ? escHtml(rt.description.substring(0, 60)) + (rt.description.length > 60 ? '...' : '') : ''}</span>
                        </div>
                        <div class="rt-amenities">
                            <div class="rt-amenities-title">Tiện nghi</div>
                            <span class="amenity-chip"><i class="fa-solid fa-wifi"></i><span>Wi-Fi</span></span>
                            <span class="amenity-chip"><i class="fa-solid fa-snowflake"></i><span>Điều hòa</span></span>
                            <span class="amenity-chip"><i class="fa-solid fa-tv"></i><span>TV</span></span>
                        </div>
                    </div>
                    <div class="rt-card-footer">
                        <button class="btn-update-price" onclick="openUpdatePrice(${rt.id}, '${escHtml(rt.typeName || '')}', ${rt.basePrice})" id="btnUpdatePrice${rt.id}">
                            <i class="fa-solid fa-tag me-1"></i>Cập nhật giá
                        </button>
                        <button class="btn-edit-rt" onclick="openEditRoomType(${rt.id})" title="Chỉnh sửa" id="btnEditRt${rt.id}">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="btn-delete-rt" onclick="deleteRoomType(${rt.id}, '${escHtml(rt.typeName || '')}')" title="Xóa" id="btnDeleteRt${rt.id}">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openUpdatePrice(id, name, currentPrice) {
        document.getElementById('priceRoomTypeId').value = id;
        document.getElementById('currentPriceDisplay').textContent = fmtPrice(currentPrice);
        document.getElementById('updatePriceTitle').innerHTML = `<i class="fa-solid fa-tag me-2"></i>Cập nhật giá - ${name}`;
        document.getElementById('newPrice').value = currentPrice;
        document.getElementById('priceError').classList.add('d-none');
        updatePriceModal.show();
    }

    document.getElementById('updatePriceForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const id = document.getElementById('priceRoomTypeId').value;
        const price = parseFloat(document.getElementById('newPrice').value);
        if (!price || price <= 0) {
            document.getElementById('priceError').classList.remove('d-none');
            return;
        }
        try {
            showLoading(true);
            // Fetch current data first, then update
            const getRes = await fetch(`${RT_API}/${id}`, { headers: { 'Accept': 'application/json' } });
            const getJson = await getRes.json();
            if (!getJson.success) throw new Error();
            const current = getJson.data;
            const payload = { typeName: current.typeName, description: current.description, basePrice: price, maxGuests: current.maxGuests };
            const res = await fetch(`${RT_API}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', ...getCsrfHeaders() },
                body: JSON.stringify(payload)
            });
            const json = await res.json();
            showLoading(false);
            if (json.success) {
                updatePriceModal.hide();
                showToast('Cập nhật giá phòng thành công!', 'success');
                loadRoomTypes();
            } else {
                showToast(json.message || 'Cập nhật thất bại', 'danger');
            }
        } catch (e) {
            showLoading(false);
            showToast('Có lỗi xảy ra', 'danger');
        }
    });

    function openAddRoomTypeModal() {
        document.getElementById('roomTypeModalTitle').innerHTML = '<i class="fa-solid fa-plus me-2"></i>Thêm loại phòng';
        document.getElementById('rtId').value = '';
        document.getElementById('roomTypeForm').reset();
        document.querySelectorAll('input[name=amenity]').forEach(c => c.checked = false);
        roomTypeModal.show();
    }

    async function openEditRoomType(id) {
        try {
            showLoading(true);
            const res = await fetch(`${RT_API}/${id}`, { headers: { 'Accept': 'application/json' } });
            const json = await res.json();
            showLoading(false);
            if (json.success) {
                const rt = json.data;
                document.getElementById('roomTypeModalTitle').innerHTML = '<i class="fa-solid fa-pen me-2"></i>Chỉnh sửa loại phòng';
                document.getElementById('rtId').value = rt.id;
                document.getElementById('rtTypeName').value = rt.typeName || '';
                document.getElementById('rtMaxGuests').value = rt.maxGuests || '';
                document.getElementById('rtBasePrice').value = rt.basePrice || '';
                document.getElementById('rtDescription').value = rt.description || '';
                roomTypeModal.show();
            }
        } catch (e) {
            showLoading(false);
            showToast('Không thể tải thông tin', 'danger');
        }
    }

    document.getElementById('roomTypeForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        this.classList.add('was-validated');
        if (!this.checkValidity()) return;
        const id = document.getElementById('rtId').value;
        const payload = {
            typeName: document.getElementById('rtTypeName').value.trim(),
            maxGuests: parseInt(document.getElementById('rtMaxGuests').value),
            basePrice: parseFloat(document.getElementById('rtBasePrice').value),
            description: document.getElementById('rtDescription').value.trim()
        };
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${RT_API}/${id}` : RT_API;
        try {
            showLoading(true);
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', ...getCsrfHeaders() },
                body: JSON.stringify(payload)
            });
            const json = await res.json();
            showLoading(false);
            if (json.success) {
                roomTypeModal.hide();
                showToast(id ? 'Cập nhật thành công!' : 'Thêm loại phòng thành công!', 'success');
                loadRoomTypes();
            } else {
                showToast(json.message || 'Lưu thất bại', 'danger');
            }
        } catch (e) {
            showLoading(false);
            showToast('Có lỗi xảy ra', 'danger');
        }
    });

    async function deleteRoomType(id, name) {
        if (!confirm(`Bạn có chắc muốn xóa loại phòng "${name}"?`)) return;
        try {
            showLoading(true);
            const res = await fetch(`${RT_API}/${id}`, { method: 'DELETE', headers: getCsrfHeaders() });
            const json = await res.json();
            showLoading(false);
            if (json.success) { showToast('Xóa thành công!', 'success'); loadRoomTypes(); }
            else showToast(json.message || 'Xóa thất bại', 'danger');
        } catch (e) {
            showLoading(false);
            showToast('Có lỗi xảy ra', 'danger');
        }
    }

    function getCsrfHeaders() {
        const token = document.querySelector('meta[name="_csrf"]')?.content;
        const header = document.querySelector('meta[name="_csrf_header"]')?.content;
        return token && header ? { [header]: token } : {};
    }
    function escHtml(str) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(String(str)));
        return d.innerHTML;
    }

    loadRoomTypes();
</script>
</body>
</html>
